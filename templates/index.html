<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .task-form {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .tasks-list {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .tasks-header {
            background: #f8f9fa;
            padding: 20px 25px;
            border-bottom: 1px solid #e0e0e0;
        }

        .tasks-header h2 {
            color: #333;
            font-size: 1.2rem;
        }

        .task-count {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background-color: #f8f9fa;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #667eea;
            border-radius: 50%;
            margin-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background-color 0.2s;
            margin-top: 2px;
        }

        .task-checkbox:hover {
            background-color: rgba(102, 126, 234, 0.1);
        }

        .task-checkbox.completed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .task-checkbox.completed::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }

        .task-description {
            font-size: 0.9rem;
            color: #666;
            word-wrap: break-word;
        }

        .task-item.completed .task-description {
            text-decoration: line-through;
            color: #bbb;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-left: 15px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.2s;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #fecaca;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .task-form,
            .tasks-header,
            .task-item {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Lista de Tareas</h1>
        
        <form class="task-form" id="taskForm">
            <div class="form-group">
                <label for="title">Título de la tarea</label>
                <input type="text" id="title" name="title" placeholder="¿Qué necesitas hacer?" required>
            </div>
            <div class="form-group">
                <label for="description">Descripción (opcional)</label>
                <textarea id="description" name="description" placeholder="Añade más detalles..."></textarea>
            </div>
            <button type="submit" class="btn">Agregar Tarea</button>
        </form>

        <div class="tasks-list">
            <div class="tasks-header">
                <h2>Mis Tareas</h2>
                <div class="task-count" id="taskCount">
                    {{ tasks|length }} tarea(s) en total
                </div>
            </div>
            
            <div id="tasksList">
                {% if tasks %}
                    {% for task in tasks %}
                    <div class="task-item {% if task.completed %}completed{% endif %}" data-id="{{ task.id }}">
                        <div class="task-checkbox {% if task.completed %}completed{% endif %}" onclick="toggleTask({{ task.id }})"></div>
                        <div class="task-content">
                            <div class="task-title">{{ task.title }}</div>
                            {% if task.description %}
                            <div class="task-description">{{ task.description }}</div>
                            {% endif %}
                        </div>
                        <div class="task-actions">
                            <button class="btn-icon btn-delete" onclick="deleteTask({{ task.id }})" title="Eliminar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No hay tareas todavía.<br>¡Agrega una para comenzar!</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('taskForm');
        const tasksList = document.getElementById('tasksList');
        const taskCount = document.getElementById('taskCount');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!title) return;
            
            form.classList.add('loading');
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                
                if (response.ok) {
                    location.reload();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al crear la tarea');
            } finally {
                form.classList.remove('loading');
            }
        });

        async function toggleTask(id) {
            try {
                const response = await fetch(`/api/tasks/${id}/toggle`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    location.reload();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deleteTask(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar esta tarea?')) return;
            
            try {
                const response = await fetch(`/api/tasks/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    location.reload();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
